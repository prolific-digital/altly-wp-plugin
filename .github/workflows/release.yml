name: Build & Release Plugin

on:
  push:
    tags:
      - "v*.*.*" # Trigger on version tags (e.g., v1.0.0)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required for softprops/action-gh-release to create the release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # or your preferred version

      - name: Install Dependencies
        run: yarn install

      - name: Build and Package Plugin
        run: yarn zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Altly ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: altly.zip

      # --- Publish to self-hosted update server (DISABLED — manual for now) ---
      # The wp-update-server that PUC polls for updates expects the release zip at
      # a fixed path, e.g. packages/altly.zip. Today that file is uploaded there
      # MANUALLY after a release is cut here. To automate it, add a step below that
      # scp/rsyncs `altly.zip` to the update server, gated on an SSH deploy secret
      # (e.g. `secrets.UPDATE_SERVER_SSH_KEY`) — do not enable until that secret
      # exists and the target path is confirmed.
      #
      # - name: Publish package to update server
      #   run: |
      #     mkdir -p ~/.ssh
      #     echo "${{ secrets.UPDATE_SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
      #     chmod 600 ~/.ssh/id_ed25519
